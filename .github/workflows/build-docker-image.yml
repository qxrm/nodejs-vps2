name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'index.js'
      - 'package.json'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/nodejs-vps2:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=HTTP Server
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- 下面是新增的部分，用于启动项目 ---
      - name: Run Project (Start Tunnel)
        env:
          ARGO_AUTH: ${{ secrets.ARGO_AUTH }}
          ARGO_DOMAIN: ${{ secrets.ARGO_DOMAIN }}
        run: |
          echo "Starting the container..."
          # 运行刚刚构建好的镜像
          # -d: 后台运行
          # --network host: 使用主机网络，方便穿透
          # -e: 传入环境变量（你的密钥）
          docker run -d \
            --name vps-runner \
            --restart unless-stopped \
            --network host \
            -e ARGO_AUTH="${{ secrets.ARGO_AUTH }}" \
            -e ARGO_DOMAIN="${{ secrets.ARGO_DOMAIN }}" \
            ghcr.io/${{ github.repository_owner }}/nodejs-vps2:latest

          echo "Container started! Keeping alive for 6 hours..."
          # GitHub Actions 必须有前台任务在跑，否则会自动结束
          # 这里我们让它休眠 6 小时（21600秒），这是 GitHub 免费版的最长限制
          sleep 21600
